name: CI

on:
  push:
    branches: [main]
    paths:
      - train.py
      - test_arch.py
  pull_request:
    paths:
      - train.py
      - test_arch.py

jobs:
  arch-check:
    runs-on: ubuntu-latest   # free GitHub runner, CPU only
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
             && pip install scipy lightgbm numpy torchinfo

      - name: Architecture check
        run: python test_arch.py
